<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="720" height="420" rx="12" fill="#fafbfc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Niche Archive</text>
  <text x="360" y="54" text-anchor="middle" font-size="11" fill="#94a3b8">Not just a flat leaderboard — structural diversity preserved alongside global optimality</text>

  <!-- LEFT: Global Bests -->
  <rect x="40" y="78" width="290" height="314" rx="10" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
  <rect x="40" y="78" width="290" height="28" rx="10" fill="#f59e0b"/>
  <rect x="40" y="98" width="290" height="8" fill="#f59e0b"/>
  <text x="185" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="white">GLOBAL BESTS</text>
  <text x="185" y="122" text-anchor="middle" font-size="10" fill="#92400e">top scoring circuits regardless of structure</text>

  <!-- Leaderboard rows -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="250" height="32" rx="5" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="12" y="20" font-size="11" font-weight="700" fill="#d97706">#1</text>
    <rect x="40" y="8" width="170" height="14" rx="3" fill="#f59e0b" opacity="0.8"/>
    <text x="215" y="20" font-size="10" fill="#78350f" font-weight="500">0.87</text>
  </g>
  <g transform="translate(60, 180)">
    <rect x="0" y="0" width="250" height="32" rx="5" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="12" y="20" font-size="11" font-weight="700" fill="#d97706">#2</text>
    <rect x="40" y="8" width="155" height="14" rx="3" fill="#f59e0b" opacity="0.65"/>
    <text x="215" y="20" font-size="10" fill="#78350f" font-weight="500">0.79</text>
  </g>
  <g transform="translate(60, 220)">
    <rect x="0" y="0" width="250" height="32" rx="5" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="12" y="20" font-size="11" font-weight="700" fill="#d97706">#3</text>
    <rect x="40" y="8" width="140" height="14" rx="3" fill="#f59e0b" opacity="0.5"/>
    <text x="215" y="20" font-size="10" fill="#78350f" font-weight="500">0.72</text>
  </g>
  <g transform="translate(60, 260)">
    <rect x="0" y="0" width="250" height="32" rx="5" fill="#fffbeb" stroke="#fde68a" stroke-width="0.8"/>
    <text x="12" y="20" font-size="11" font-weight="700" fill="#d97706">#4</text>
    <rect x="40" y="8" width="120" height="14" rx="3" fill="#f59e0b" opacity="0.35"/>
    <text x="215" y="20" font-size="10" fill="#78350f" font-weight="500">0.63</text>
  </g>

  <text x="185" y="318" text-anchor="middle" font-size="10" fill="#94a3b8">…</text>

  <text x="185" y="348" text-anchor="middle" font-size="10" fill="#64748b">May converge on one motif family</text>
  <text x="185" y="365" text-anchor="middle" font-size="10" fill="#64748b">if that family dominates scoring</text>

  <!-- RIGHT: Niche Elites -->
  <rect x="390" y="78" width="290" height="314" rx="10" fill="white" stroke="#10b981" stroke-width="2" filter="url(#sh)"/>
  <rect x="390" y="78" width="290" height="28" rx="10" fill="#10b981"/>
  <rect x="390" y="98" width="290" height="8" fill="#10b981"/>
  <text x="535" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="white">NICHE ELITES</text>
  <text x="535" y="122" text-anchor="middle" font-size="10" fill="#047857">best representative per structural family</text>

  <!-- Niche descriptor -->
  <g transform="translate(405, 136)">
    <text x="0" y="0" font-size="9" fill="#64748b" font-weight="500">NICHE KEY =</text>
    <rect x="76" y="-10" width="60" height="16" rx="3" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="0.8"/>
    <text x="106" y="2" text-anchor="middle" font-size="8" fill="#047857">edges</text>
    <text x="140" y="2" font-size="9" fill="#94a3b8">×</text>
    <rect x="148" y="-10" width="60" height="16" rx="3" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="0.8"/>
    <text x="178" y="2" text-anchor="middle" font-size="8" fill="#047857">act/inh</text>
    <text x="212" y="2" font-size="9" fill="#94a3b8">×</text>
    <rect x="220" y="-10" width="48" height="16" rx="3" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="0.8"/>
    <text x="244" y="2" text-anchor="middle" font-size="8" fill="#047857">motif</text>
  </g>

  <!-- Niche rows -->
  <g transform="translate(410, 160)">
    <rect x="0" y="0" width="254" height="38" rx="5" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <rect x="8" y="8" width="10" height="10" rx="2" fill="#10b981"/>
    <text x="26" y="17" font-size="10" font-weight="600" fill="#064e3b">repressilator</text>
    <text x="26" y="31" font-size="9" fill="#64748b">3 edges · 0 act / 3 inh · 0 self</text>
    <text x="220" y="22" font-size="10" fill="#047857" font-weight="500">0.87</text>
  </g>
  <g transform="translate(410, 206)">
    <rect x="0" y="0" width="254" height="38" rx="5" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <rect x="8" y="8" width="10" height="10" rx="2" fill="#14b8a6"/>
    <text x="26" y="17" font-size="10" font-weight="600" fill="#064e3b">mixed-cycle</text>
    <text x="26" y="31" font-size="9" fill="#64748b">4 edges · 2 act / 2 inh · 1 self</text>
    <text x="220" y="22" font-size="10" fill="#047857" font-weight="500">0.72</text>
  </g>
  <g transform="translate(410, 252)">
    <rect x="0" y="0" width="254" height="38" rx="5" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <rect x="8" y="8" width="10" height="10" rx="2" fill="#34d399"/>
    <text x="26" y="17" font-size="10" font-weight="600" fill="#064e3b">goodwin</text>
    <text x="26" y="31" font-size="9" fill="#64748b">3 edges · 2 act / 1 inh · 0 self</text>
    <text x="220" y="22" font-size="10" fill="#047857" font-weight="500">0.58</text>
  </g>
  <g transform="translate(410, 298)">
    <rect x="0" y="0" width="254" height="38" rx="5" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <rect x="8" y="8" width="10" height="10" rx="2" fill="#6ee7b7"/>
    <text x="26" y="17" font-size="10" font-weight="600" fill="#064e3b">activation-heavy</text>
    <text x="26" y="31" font-size="9" fill="#64748b">5 edges · 4 act / 1 inh · 2 self</text>
    <text x="220" y="22" font-size="10" fill="#047857" font-weight="500">0.41</text>
  </g>

  <text x="535" y="360" text-anchor="middle" font-size="10" fill="#64748b">Preserves structural diversity</text>
  <text x="535" y="377" text-anchor="middle" font-size="10" fill="#64748b">even if one family dominates globally</text>

  <!-- Plus sign between -->
  <circle cx="360" cy="230" r="16" fill="#1e293b"/>
  <text x="360" y="235" text-anchor="middle" font-size="16" font-weight="700" fill="white">+</text>
</svg>
