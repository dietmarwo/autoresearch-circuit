<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="720" height="440" rx="12" fill="#fafbfc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Search Progress Over Iterations</text>
  <text x="360" y="54" text-anchor="middle" font-size="11" fill="#94a3b8">Example convergence profile for outer-loop topology search</text>

  <!-- Chart area -->
  <rect x="80" y="75" width="560" height="280" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>

  <!-- Grid lines -->
  <g stroke="#f1f5f9" stroke-width="0.8">
    <line x1="130" y1="100" x2="620" y2="100"/>
    <line x1="130" y1="145" x2="620" y2="145"/>
    <line x1="130" y1="190" x2="620" y2="190"/>
    <line x1="130" y1="235" x2="620" y2="235"/>
    <line x1="130" y1="280" x2="620" y2="280"/>
    <line x1="130" y1="325" x2="620" y2="325"/>
  </g>

  <!-- Axes -->
  <line x1="130" y1="90" x2="130" y2="335" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="130" y1="335" x2="625" y2="335" stroke="#94a3b8" stroke-width="1.2"/>

  <!-- Y-axis labels -->
  <text x="120" y="103" text-anchor="end" font-size="9" fill="#94a3b8">1.0</text>
  <text x="120" y="148" text-anchor="end" font-size="9" fill="#94a3b8">0.8</text>
  <text x="120" y="193" text-anchor="end" font-size="9" fill="#94a3b8">0.6</text>
  <text x="120" y="238" text-anchor="end" font-size="9" fill="#94a3b8">0.4</text>
  <text x="120" y="283" text-anchor="end" font-size="9" fill="#94a3b8">0.2</text>
  <text x="120" y="328" text-anchor="end" font-size="9" fill="#94a3b8">0.0</text>

  <!-- X-axis labels -->
  <text x="130" y="350" text-anchor="middle" font-size="9" fill="#94a3b8">0</text>
  <text x="228" y="350" text-anchor="middle" font-size="9" fill="#94a3b8">5</text>
  <text x="326" y="350" text-anchor="middle" font-size="9" fill="#94a3b8">10</text>
  <text x="424" y="350" text-anchor="middle" font-size="9" fill="#94a3b8">15</text>
  <text x="522" y="350" text-anchor="middle" font-size="9" fill="#94a3b8">20</text>
  <text x="620" y="350" text-anchor="middle" font-size="9" fill="#94a3b8">25</text>

  <!-- Axis titles -->
  <text x="375" y="368" text-anchor="middle" font-size="10" fill="#64748b">iteration</text>
  <text x="56" y="212" text-anchor="middle" font-size="10" fill="#64748b" transform="rotate(-90,56,212)">score / count (normalized)</text>

  <!-- Bootstrap region shading -->
  <rect x="130" y="90" width="78" height="245" fill="#6366f1" opacity="0.04"/>
  <text x="169" y="86" text-anchor="middle" font-size="8" fill="#6366f1" font-style="italic">bootstrap</text>

  <!-- Best rank score (orange line, improving) -->
  <polyline points="
    130,325 150,315 170,300 190,280 210,260
    228,248 250,235 270,220 290,198 310,180
    326,168 345,155 365,148 385,142 405,138
    424,135 445,132 465,128 485,125 505,122
    522,120 542,118 562,116 582,115 600,114 620,113
  " fill="none" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Mean rank score (blue line, slower improvement) -->
  <polyline points="
    130,325 150,322 170,318 190,312 210,305
    228,295 250,285 270,272 290,260 310,252
    326,245 345,240 365,236 385,232 405,228
    424,225 445,222 465,220 485,218 505,216
    522,215 542,214 562,213 582,212 600,212 620,211
  " fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,3"/>

  <!-- Niche count (green, step-like, using secondary scale mapping: 0-10 niches) -->
  <polyline points="
    130,325 150,325 170,325 190,302
    210,302 228,280 250,280 270,258
    290,258 310,258 326,236 345,236
    365,236 385,214 405,214 424,214
    445,192 465,192 485,192 505,192
    522,192 542,192 562,192 582,192 600,192 620,192
  " fill="none" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Legend -->
  <g transform="translate(420, 85)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#f59e0b" stroke-width="2.2"/>
    <text x="30" y="4" font-size="10" fill="#78350f">best rank score</text>
  </g>
  <g transform="translate(420, 103)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="30" y="4" font-size="10" fill="#0c4a6e">mean rank score</text>
  </g>
  <g transform="translate(420, 121)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#10b981" stroke-width="1.8" opacity="0.7"/>
    <text x="30" y="4" font-size="10" fill="#047857">niche count</text>
  </g>

  <!-- Annotations -->
  <g transform="translate(200, 270)">
    <line x1="0" y1="0" x2="0" y2="-14" stroke="#94a3b8" stroke-width="0.8"/>
    <text x="0" y="-18" text-anchor="middle" font-size="8" fill="#94a3b8">first strong hit</text>
  </g>

  <!-- Footer note -->
  <text x="360" y="400" text-anchor="middle" font-size="10" fill="#64748b">Illustrative profile — actual convergence depends on experiment, strategy, and stochastic seed.</text>
  <text x="360" y="418" text-anchor="middle" font-size="10" fill="#94a3b8">For robust5, additional sub-panels track knockout q25, knockdown q25, and jitter q25.</text>
</svg>
