<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="ad" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1,0 L5,10 L9,0" fill="none" stroke="#475569" stroke-width="1.5"/>
    </marker>
    <linearGradient id="funnelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>

  <rect width="680" height="540" rx="12" fill="#fafbfc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Stability Funnel</text>
  <text x="340" y="54" text-anchor="middle" font-size="11" fill="#94a3b8">From candidate topology to validated stable design</text>

  <!-- Funnel trapezoid background -->
  <path d="M 130,72 L 550,72 L 490,510 L 190,510 Z" fill="url(#funnelGrad)" opacity="0.3" rx="6"/>

  <!-- Stage 1: Candidate -->
  <rect x="155" y="72" width="370" height="64" rx="8" fill="white" stroke="#6366f1" stroke-width="1.8" filter="url(#sh)"/>
  <circle cx="195" cy="104" r="16" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2"/>
  <text x="195" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#6366f1">1</text>
  <text x="225" y="96" font-size="12" font-weight="600" fill="#312e81">Candidate Topology T</text>
  <text x="225" y="115" font-size="10" fill="#64748b">proposed by outer loop (random / evo / LLM)</text>
  <line x1="340" y1="136" x2="340" y2="156" stroke="#475569" stroke-width="1.3" marker-end="url(#ad)"/>

  <!-- Stage 2: Raw training -->
  <rect x="170" y="158" width="340" height="64" rx="8" fill="white" stroke="#0ea5e9" stroke-width="1.8" filter="url(#sh)"/>
  <circle cx="210" cy="190" r="16" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.2"/>
  <text x="210" y="194" text-anchor="middle" font-size="12" font-weight="700" fill="#0ea5e9">2</text>
  <text x="240" y="182" font-size="12" font-weight="600" fill="#0c4a6e">Raw Training Score</text>
  <text x="240" y="201" font-size="10" fill="#64748b">short horizon, cheap inner evals with fcmaes</text>
  <line x1="340" y1="222" x2="340" y2="242" stroke="#475569" stroke-width="1.3" marker-end="url(#ad)"/>

  <!-- Stage 3: Validation -->
  <rect x="180" y="244" width="320" height="64" rx="8" fill="white" stroke="#8b5cf6" stroke-width="1.8" filter="url(#sh)"/>
  <circle cx="220" cy="276" r="16" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="220" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#8b5cf6">3</text>
  <text x="250" y="268" font-size="12" font-weight="600" fill="#4c1d95">Validation Score</text>
  <text x="250" y="287" font-size="10" fill="#64748b">longer horizon, more seeds, gap penalty</text>
  <line x1="340" y1="308" x2="340" y2="328" stroke="#475569" stroke-width="1.3" marker-end="url(#ad)"/>

  <!-- Stage 4: Stress panel -->
  <rect x="190" y="330" width="300" height="86" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.8" filter="url(#sh)"/>
  <circle cx="230" cy="356" r="16" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="230" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#f59e0b">4</text>
  <text x="260" y="352" font-size="12" font-weight="600" fill="#78350f">Stress Panel</text>
  <g transform="translate(260, 366)">
    <rect x="0" y="0" width="72" height="18" rx="3" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.8"/>
    <text x="36" y="13" text-anchor="middle" font-size="9" fill="#92400e">knockout</text>
  </g>
  <g transform="translate(340, 366)">
    <rect x="0" y="0" width="72" height="18" rx="3" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.8"/>
    <text x="36" y="13" text-anchor="middle" font-size="9" fill="#92400e">knockdown</text>
  </g>
  <g transform="translate(260, 390)">
    <rect x="0" y="0" width="152" height="18" rx="3" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.8"/>
    <text x="76" y="13" text-anchor="middle" font-size="9" fill="#92400e">parameter jitter</text>
  </g>
  <line x1="340" y1="416" x2="340" y2="436" stroke="#475569" stroke-width="1.3" marker-end="url(#ad)"/>

  <!-- Stage 5: Final rank -->
  <rect x="200" y="438" width="280" height="70" rx="8" fill="white" stroke="#10b981" stroke-width="2" filter="url(#sh)"/>
  <circle cx="240" cy="467" r="16" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="240" y="471" text-anchor="middle" font-size="12" font-weight="700" fill="#10b981">5</text>
  <text x="270" y="460" font-size="12" font-weight="600" fill="#064e3b">Rank Score</text>
  <text x="270" y="479" font-size="10" fill="#64748b">validation − gap penalty</text>
  <text x="270" y="495" font-size="9" fill="#94a3b8">+ stress q25 for robust5</text>

  <!-- Right-side rejection labels -->
  <g transform="translate(540, 180)">
    <text x="0" y="0" font-size="9" fill="#ef4444" font-weight="500">✕ lucky noise</text>
  </g>
  <g transform="translate(530, 268)">
    <text x="0" y="0" font-size="9" fill="#ef4444" font-weight="500">✕ transient oscillation</text>
  </g>
  <g transform="translate(520, 362)">
    <text x="0" y="0" font-size="9" fill="#ef4444" font-weight="500">✕ knife-edge tuning</text>
    <text x="0" y="16" font-size="9" fill="#ef4444" font-weight="500">✕ fragile structure</text>
  </g>
</svg>
